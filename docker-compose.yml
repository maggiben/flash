services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservations"]
      interval: 3s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/reservations?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/reservations?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy

  frontend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: test
    command: ["npm", "run", "test:run"]

volumes:
  postgres_data:
